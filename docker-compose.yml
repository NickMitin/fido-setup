# FIDO Echo-Conference Setup
# FidoNet echomail node with BinkD, Husky, and GoldEd+
# Based on Fidian: https://github.com/stimpy23/fidian-docker

services:
  fido:
    image: stimpy23/fidian:latest
    container_name: fido-echo
    restart: unless-stopped
    ports:
      - "24554:24554"   # BinkP protocol
      - "24580:24580"   # Web console (TTYd)
    volumes:
      - binkd_config:/etc/binkd
      - husky_config:/etc/husky
      - ftn_spool:/var/spool/ftn
      - fidian_logs:/var/log/fidian
    command: ["/bin/sh", "-c", "grep -q '${FIDO_ECHO_AREA:-NICKMITIN.SAYS}' /etc/husky/areas 2>/dev/null || echo 'EchoArea ${FIDO_ECHO_AREA:-NICKMITIN.SAYS} /var/spool/ftn/msgbase/fido/${FIDO_ECHO_AREA:-NICKMITIN.SAYS} -a ${YOUR_AKA:-2:5023/24.4421} -b Jam ${UPLINK_AKA:-2:5023/24}' >> /etc/husky/areas; mkdir -p /var/spool/ftn/msgbase/fido/${FIDO_ECHO_AREA:-NICKMITIN.SAYS} && chown -R fido:ftn /var/spool/ftn/msgbase/fido 2>/dev/null; mkdir -p /var/log/husky /var/log/binkd && chown -R fido:ftn /var/log/husky /var/log/binkd /var/spool/ftn && chmod -R 775 /var/log/husky /var/log/binkd /var/spool/ftn && /usr/bin/supervisord -n -j /run/supervisord.pid -c /etc/supervisor/supervisord.conf & sleep 5 && supervisorctl start ttyd:ttyd_00 2>/dev/null || true && wait"]
    environment:
      - LINK_NAME=${LINK_NAME:-FidoNet}
      - LINK_DOMAIN=${LINK_DOMAIN:-fidonet}
      - YOUR_NAME=${YOUR_NAME:-Fido User}
      - YOUR_AKA=${YOUR_AKA:-0:0/0.0}
      - YOUR_SYSTEM=${YOUR_SYSTEM:-FIDO-Echo 2026}
      - YOUR_LOCATION=${YOUR_LOCATION:-Local}
      - YOUR_HOSTNAME=${YOUR_HOSTNAME:-fido-echo}
      - UPLINK_HOST=${UPLINK_HOST}
      - UPLINK_PORT=${UPLINK_PORT:-24554}
      - UPLINK_AKA=${UPLINK_AKA}
      - SESSION_PASSWORD=${SESSION_PASSWORD}
      # Fidian uses _1 suffix for first link — must override image defaults
      - LINK_NAME_1=${LINK_NAME:-FidoNet}
      - LINK_DOMAIN_1=${LINK_DOMAIN:-fidonet}
      - YOUR_NAME_1=${YOUR_NAME}
      - YOUR_AKA_1=${YOUR_AKA}
      - UPLINK_HOST_1=${UPLINK_HOST}
      - UPLINK_PORT_1=${UPLINK_PORT:-24554}
      - UPLINK_AKA_1=${UPLINK_AKA}
      - SESSION_PASSWORD_1=${SESSION_PASSWORD}
      - PACKET_PASSWORD_1=${PACKET_PASSWORD:-}
      - AREAFIX_PASSWORD_1=${AREAFIX_PASSWORD:-}
      - FILEFIX_PASSWORD_1=${FILEFIX_PASSWORD:-}
      - PACKET_PASSWORD=${PACKET_PASSWORD:-}
      - AREAFIX_PASSWORD=${AREAFIX_PASSWORD:-}
      - FILEFIX_PASSWORD=${FILEFIX_PASSWORD:-}
      - WEB_PASSWORD=${WEB_PASSWORD:-fidian}
      - ENABLE_TTYD=${ENABLE_TTYD:-1}
      - TZ=${TZ:-UTC}
      - FIDO_ECHO_AREA=${FIDO_ECHO_AREA:-NICKMITIN.SAYS}
    # If env vars are unset, interactive config wizard runs on first login

  telegram-bot:
    build: ./telegram2fido
    image: fido-setup/telegram-bot:latest
    container_name: fido-telegram-bot
    restart: unless-stopped
    depends_on:
      - fido
    volumes:
      - husky_config:/etc/husky:ro
      - ftn_spool:/var/spool/ftn
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_API_ID=${TELEGRAM_API_ID:-}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH:-}
      - FIDO_ECHO_AREA=${FIDO_ECHO_AREA:-NICKMITIN.SAYS}
      - FIDO_SENDER_NAME=${FIDO_SENDER_NAME:-TG-Bot}
      - TELEGRAM_CHANNEL_ID=${TELEGRAM_CHANNEL_ID:-}
      - FIDOCONFIG=/etc/husky
    user: "fido"

  md2fido:
    build:
      context: .
      dockerfile: md2fido/Dockerfile
    image: fido-setup/md2fido:latest
    container_name: fido-md2fido
    restart: unless-stopped
    depends_on:
      - fido
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ftn_spool:/var/spool/ftn
      - posts_posted:/posts/posted
    environment:
      - FIDO_ECHO_AREA=${FIDO_ECHO_AREA:-NICKMITIN.SAYS}
      - FIDO_SENDER_NAME=${FIDO_SENDER_NAME:-MD-Poster}
      - FIDO_CONTAINER=fido-echo
      - POSTS_DIR=/posts
    user: "root"

volumes:
  binkd_config:
  husky_config:
  ftn_spool:
  fidian_logs:
  posts_posted:
